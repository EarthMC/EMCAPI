name: EMCAPI
version: "${version}"
main: net.earthmc.emcapi.EMCAPI
api-version: "1.20"
depend: [Towny]
softdepend: [MysteryMaster, Quarters, DiscordSRV, SuperbVote, QuickShop]
authors: [Fruitloopins]
contributors: [Warriorrr, Yoditi, Veyronity]
description: API for EarthMC using Javalin
website: "https://github.com/EarthMC/EMCAPI/commit/${commit}"
folia-supported: true

commands:
  api:
    description: Allows you to opt in or out of your information being visible in the API.
    permission: emcapi.command

permissions:
  emcapi.command:
    default: true
    description: Allow access to the /api command
  emcapi.key:
    default: true
    description: Allow players to create API keys

libraries:
  - io.javalin:javalin:${javalin_version}
